name: phonolite_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  ffi: ^2.1.0
  phonolite_opus:
    path: packages/phonolite_opus
  phonolite_quic:
    path: packages/phonolite_quic
  http: ^1.2.1
  palette_generator: ^0.3.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/phonolite-logo-nobackground.png
    - assets/images/phonolite-logo.png
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  min_sdk_android: 21
  image_path_android: "assets/images/phonolite-logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/phonolite-logo-nobackground.png"
  adaptive_icon_foreground_inset: 28
